services:
  - type: web
    name: hireloop
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: hireloop-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/hireloop.sqlite
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: LINKEDIN_HEADLESS
        value: true
