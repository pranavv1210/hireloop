services:
  - type: web
    name: hireloop
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/hireloop.sqlite
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: LINKEDIN_HEADLESS
        value: true
